defaults:
  - seed: seed_42
  - data: dataset  # Load list of dataset cfgs and use SLURM_ARRAY_TASK_ID to index the list
  - imputation_method: dummy_value
  - model: tempo/leak_test_data
  - results: default
  - _self_

# Hydra
hydra:
  run:
    dir: ./output/hydra

# 32-bit floating point precision for torch 
precision: medium

# Which split of GIFT-Eval the checkpoint was trained on 
gift_split: train_test

# Batch size for evaluation 
batch_size: 256



